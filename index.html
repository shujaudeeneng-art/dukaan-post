<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dukaan Post – Free Social Media Banner & Post Generator</title>
<style>
  :root {
    --primary: #0d7a4f;
    --secondary: #ff7a1a;
    --bg-light: #f7f8fa;
    --text-dark: #1a1f26;
    --border: #e1e4e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-light); color: var(--text-dark); padding: 20px; }
  .navbar { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); margin-bottom: 20px; border-radius: 8px; }
  .logo { font-size: 22px; font-weight: 800; color: var(--primary); text-decoration: none; }
  .lang-switcher { display: flex; gap: 8px; }
  .lang-btn { background: #fff; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-weight: 600; }
  .lang-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  
  .hero-banner { 
    background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=1000&q=80');
    background-size: cover; background-position: center; color: #fff; padding: 40px 20px; border-radius: 12px; text-align: center; margin-bottom: 20px;
  }
  .hero-banner h1 { font-size: 26px; margin-bottom: 8px; }
  
  .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 768px) { .workspace { grid-template-columns: 1fr; } }
  
  .card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
  .card-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: var(--primary); padding-bottom: 5px; border-bottom: 2px solid var(--bg-light); }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
  .form-control { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; }
  
  .btn-generate { width: 100%; background: var(--secondary); color: #fff; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
  .btn-generate:hover { background: #e06613; }
  
  .results-container { display: none; flex-direction: column; gap: 15px; align-items: center; }
  .results-container.show { display: flex; }
  .result-card { background: var(--bg-light); border: 1px solid var(--border); border-radius: 8px; padding: 15px; width: 100%; text-align: center; }
  
  /* Canvas Preview styling */
  canvas { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; background: #fff; }
  
  .action-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
  .download-btn { background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 15px; }
  .download-btn:hover { background: #0a5f3d; }
  .copy-btn { background: #fff; border: 1px solid var(--secondary); color: var(--secondary); padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 15px; }
  .copy-btn:hover { background: var(--secondary); color: #fff; }
</style>
</head>
<body>

<nav class="navbar">
  <a href="#" class="logo">🏪 Dukaan Post</a>
  <div class="lang-switcher">
    <button id="langUrBtn" class="lang-btn active">Urdu</button>
    <button id="langEnBtn" class="lang-btn">English</button>
  </div>
</nav>

<header class="hero-banner" id="heroBanner">
  <h1 id="dynamicTitle">Apni Dukaan Ki Marketing Ke Liye Photos Banayein</h1>
  <p id="dynamicSub">Sirf 10 seconds mein professional banners aur captions generate kar ke download karein.</p>
</header>

<div class="workspace">
  <div class="card">
    <div class="card-title">📝 Details Dalein</div>
    <form id="generatorForm" onsubmit="return false;">
      <div class="form-group">
        <label>Dukaan Ka Naam (Shop Name)</label>
        <input type="text" id="shopName" class="form-control" placeholder="MashaAllah Clothing, Imran Mobiles..." required>
      </div>

      <div class="form-group">
        <label>Dukaan / Business Ki Category</label>
        <select id="businessType" class="form-control">
          <option value="clothing">Kapron Ki Dukaan (Clothing)</option>
          <option value="mobile">Mobile & Accessories Shop</option>
          <option value="restaurant">Restaurant / Food Point</option>
          <option value="bakery">Bakery & Sweets Shop</option>
          <option value="cosmetics">Cosmetics & Beauty</option>
          <option value="electronics">Home Electronics</option>
          <option value="grocery">Grocery / Karyana Store</option>
          <option value="shoes">Jooton Ki Dukaan (Footwear)</option>
          <option value="jewelry">Jewelry Shop</option>
          <option value="general">General Store / Products</option>
        </select>
      </div>

      <div class="form-group">
        <label>Kis Tarah Ki Post Banani Hai?</label>
        <select id="postType" class="form-control">
          <option value="sale">Special Discount / Sale Offer</option>
          <option value="arrival">New Stock / New Arrival</option>
          <option value="eid">Eid Mubarak Special Offer</option>
          <option value="weekend">Weekend Special Deal</option>
          <option value="clearance">Stock Clearance Sale</option>
        </select>
      </div>

      <div class="form-group">
        <label>Discount Offer (Optional)</label>
        <select id="discount" class="form-control">
          <option value="No Discount">No Discount</option>
          <option value="10% OFF">10% OFF</option>
          <option value="20% OFF">20% OFF</option>
          <option value="30% OFF">30% OFF</option>
          <option value="50% OFF">50% OFF</option>
          <option value="Buy 1 Get 1 Free">Buy 1 Get 1 Free</option>
          <option value="Free Delivery">Free Home Delivery</option>
        </select>
      </div>

      <div class="form-group">
        <label>Apne Shehar Ka Naam</label>
        <input type="text" id="city" class="form-control" placeholder="Lahore, Karachi..." required>
      </div>

      <div class="form-group">
        <label>WhatsApp / Phone Number</label>
        <input type="text" id="contact" class="form-control" placeholder="03001234567" required>
      </div>

      <button type="button" id="generateBtn" class="btn-generate" onclick="generatePost()">✨ Photo aur Post Banayein</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">🚀 Aap Ki Ready Photo & Post</div>
    <div id="results" class="results-container show">
       <p id="placeholderText" style="color: #5a6472; text-align: center; margin-top: 40px;">Details bhar kar 'Photo aur Post Banayein' par click karein.</p>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
